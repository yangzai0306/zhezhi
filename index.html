<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>折纸作品集 · 图文步骤</title>
  <style>
    :root {
      --bg: #faf7f2;
      --card-bg: #ffffff;
      --text: #3d322b;
      --text-light: #6b5e53;
      --text-lighter: #9b8c7f;
      --accent: #c75b3a;
      --accent-hover: #a8432a;
      --gold: #d4a853;
      --border: #e8e0d5;
      --shadow-sm: 0 2px 8px rgba(61, 50, 43, 0.06);
      --shadow-md: 0 6px 24px rgba(61, 50, 43, 0.10);
      --shadow-lg: 0 16px 48px rgba(61, 50, 43, 0.14);
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      --font-heading: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
      --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
      --easy: #7da87b;
      --medium: #d4a853;
      --hard: #c75b3a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 15% 10%, rgba(212,168,83,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, rgba(199,91,58,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(180,160,140,0.03) 0%, transparent 70%);
    }
    .header-accents {
      position: fixed; top:0; left:0; width:100%; pointer-events:none; z-index:0; opacity:0.55;
    }
    .header-accents .triangle {
      position: absolute; width:0; height:0;
      border-left:22px solid transparent; border-right:22px solid transparent;
      border-bottom:38px solid rgba(199,91,58,0.13);
      animation: floatTriangle 14s ease-in-out infinite;
    }
    .header-accents .triangle:nth-child(1){ top:60px; left:8%; border-bottom-color:rgba(199,91,58,0.16); animation-delay:0s; }
    .header-accents .triangle:nth-child(2){ top:130px; right:10%; border-bottom-color:rgba(212,168,83,0.18); animation-delay:-5s; border-left-width:16px; border-right-width:16px; border-bottom-width:28px; }
    .header-accents .triangle:nth-child(3){ top:200px; left:18%; border-bottom-color:rgba(125,168,123,0.14); animation-delay:-9s; border-left-width:18px; border-right-width:18px; border-bottom-width:32px; }
    .header-accents .triangle:nth-child(4){ top:90px; right:22%; border-bottom-color:rgba(180,140,120,0.15); animation-delay:-3s; border-left-width:14px; border-right-width:14px; border-bottom-width:24px; }
    @keyframes floatTriangle {
      0%,100%{ transform:translateY(0) rotate(0deg); }
      25%{ transform:translateY(-18px) rotate(3deg); }
      50%{ transform:translateY(-6px) rotate(-2deg); }
      75%{ transform:translateY(-22px) rotate(1deg); }
    }

    .app-container { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 20px; }

    .header { text-align:center; padding:48px 20px 28px; position:relative; }
    .header .logo-icon {
      font-size:56px; display:inline-block; animation:gentleBounce 3s ease-in-out infinite;
      filter:drop-shadow(0 4px 12px rgba(199,91,58,0.2));
    }
    @keyframes gentleBounce { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-14px);} 50%{transform:translateY(0);} 70%{transform:translateY(-7px);} }
    .header h1 { font-family:var(--font-heading); font-size:2.6rem; font-weight:700; color:var(--text); margin:10px 0 6px; letter-spacing:0.03em; }
    .header .subtitle { font-size:1.05rem; color:var(--text-light); font-weight:400; letter-spacing:0.02em; }
    .header .divider { display:inline-block; width:50px; height:3px; background:var(--accent); border-radius:2px; margin-top:14px; opacity:0.7; }

    .toolbar { display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:12px; padding:8px 0 32px; position:relative; z-index:2; }
    .search-wrapper { position:relative; flex:1 1 240px; max-width:360px; }
    .search-wrapper input { width:100%; padding:12px 16px 12px 44px; border:2px solid var(--border); border-radius:50px; font-size:0.95rem; font-family:var(--font-body); background:var(--card-bg); color:var(--text); transition:var(--transition); outline:none; }
    .search-wrapper input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(199,91,58,0.08); }
    .search-wrapper .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:1.1rem; color:var(--text-lighter); pointer-events:none; transition:var(--transition); }
    .search-wrapper input:focus+.search-icon { color:var(--accent); }
    .filter-btns { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-btn { padding:9px 18px; border:2px solid var(--border); border-radius:50px; background:var(--card-bg); cursor:pointer; font-size:0.9rem; font-family:var(--font-body); color:var(--text-light); transition:var(--transition); white-space:nowrap; font-weight:500; }
    .filter-btn:hover { border-color:var(--accent); color:var(--accent); background:#fefaf7; }
    .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 10px rgba(199,91,58,0.25); }
    .btn-add { padding:11px 22px; border-radius:50px; background:var(--accent); color:#fff; border:none; cursor:pointer; font-size:0.95rem; font-family:var(--font-body); font-weight:600; letter-spacing:0.02em; transition:var(--transition); box-shadow:0 4px 16px rgba(199,91,58,0.3); white-space:nowrap; display:flex; align-items:center; gap:7px; }
    .btn-add:hover { background:var(--accent-hover); box-shadow:0 6px 22px rgba(199,91,58,0.4); transform:translateY(-2px); }
    .btn-reset { padding:9px 16px; border-radius:50px; background:transparent; color:var(--text-lighter); border:1.5px dashed var(--border); cursor:pointer; font-size:0.85rem; font-family:var(--font-body); transition:var(--transition); white-space:nowrap; }
    .btn-reset:hover { border-color:var(--text-lighter); color:var(--text-light); background:#fdfaf6; }

    .works-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(310px, 1fr)); gap:26px; padding-bottom:40px; }
    .work-card { background:var(--card-bg); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:var(--transition); box-shadow:var(--shadow-sm); border:1px solid var(--border); position:relative; display:flex; flex-direction:column; height:100%; }
    .work-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-6px); border-color:#dcd3c5; }
    .card-image { width:100%; height:200px; object-fit:cover; display:block; background:#f5f0e9; }
    .card-placeholder {
      width:100%; height:200px; display:flex; align-items:center; justify-content:center;
      font-size:2.4rem; font-family:var(--font-heading); font-weight:700; color:#fff;
      letter-spacing:0.04em; text-shadow:0 2px 8px rgba(0,0,0,0.1);
      background: #d9c8b4;
    }
    .card-body { padding:18px 20px 20px; flex:1; display:flex; flex-direction:column; gap:8px; }
    .card-body .card-name { font-family:var(--font-heading); font-size:1.25rem; font-weight:700; color:var(--text); letter-spacing:0.02em; }
    .card-body .card-desc { font-size:0.9rem; color:var(--text-light); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; flex:1; }
    .card-meta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; font-size:0.82rem; color:var(--text-lighter); margin-top:4px; }
    .tag { display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.75rem; font-weight:500; letter-spacing:0.02em; }
    .tag-difficulty-easy { background:#eaf5e8; color:#4a7a48; }
    .tag-difficulty-medium { background:#fdf3df; color:#9b7a30; }
    .tag-difficulty-hard { background:#fde8e4; color:#a84a35; }
    .tag-time { background:#f3f0eb; color:#6b5e53; }
    .tag-category { background:#eef3f8; color:#4a6580; }
    .card-delete-btn {
      position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,0.85); border:1px solid #e0d8cc; cursor:pointer;
      font-size:0.85rem; color:#b0a090; display:flex; align-items:center; justify-content:center;
      transition:var(--transition); z-index:3; backdrop-filter:blur(4px); opacity:0;
    }
    .work-card:hover .card-delete-btn { opacity:1; }
    .card-delete-btn:hover { background:#fde8e4; color:#c75b3a; border-color:#f0c4b8; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--text-lighter); grid-column:1 / -1; }
    .empty-state .empty-icon { font-size:80px; display:block; margin-bottom:16px; opacity:0.7; }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(40,30,22,0.55); z-index:100;
      display:flex; align-items:center; justify-content:center; padding:20px;
      animation:fadeIn 0.25s ease; backdrop-filter:blur(2px);
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .modal-overlay.closing { animation:fadeOut 0.2s ease forwards; }
    @keyframes fadeOut { from{opacity:1;} to{opacity:0;} }
    .modal {
      background:#fffdf9; border-radius:var(--radius-lg); max-width:620px; width:100%;
      max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg); position:relative;
      animation:slideUp 0.32s cubic-bezier(0.22,0.61,0.36,1); border:1px solid var(--border);
    }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    .modal.closing { animation:slideDown 0.22s ease forwards; }
    @keyframes slideDown { from{transform:translateY(0);opacity:1;} to{transform:translateY(40px);opacity:0;} }
    .modal-close {
      position:sticky; top:16px; float:right; width:38px; height:38px; border-radius:50%;
      background:rgba(255,255,255,0.9); border:1px solid var(--border); cursor:pointer;
      font-size:1.2rem; color:var(--text-light); z-index:5; display:flex; align-items:center;
      justify-content:center; transition:var(--transition); backdrop-filter:blur(6px); margin-right:8px;
    }
    .modal-close:hover { background:#fde8e4; color:var(--accent); border-color:#f0c4b8; }
    .modal-content { padding:10px 28px 32px; }
    .modal-content h2 { font-family:var(--font-heading); font-size:1.75rem; margin-bottom:6px; color:var(--text); letter-spacing:0.02em; padding-right:40px; }
    .modal-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; align-items:center; }
    .modal-desc { color:var(--text-light); margin-bottom:20px; font-size:0.95rem; line-height:1.6; }
    .modal-image-area { width:100%; height:200px; border-radius:var(--radius); overflow:hidden; margin-bottom:20px; background:#f5f0e9; display:flex; align-items:center; justify-content:center; font-size:2.4rem; color:#fff; font-family:var(--font-heading); }
    .modal-image-area img { width:100%; height:100%; object-fit:cover; }
    .steps-title { font-family:var(--font-heading); font-size:1.2rem; font-weight:700; margin-bottom:16px; color:var(--text); letter-spacing:0.02em; }
    .steps-timeline { position:relative; padding-left:10px; }
    .step-item { display:flex; gap:18px; position:relative; padding-bottom:22px; }
    .step-item:last-child { padding-bottom:0; }
    .step-number-wrapper { display:flex; flex-direction:column; align-items:center; flex-shrink:0; width:38px; }
    .step-number { width:36px; height:36px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; flex-shrink:0; z-index:1; box-shadow:0 2px 8px rgba(199,91,58,0.3); }
    .step-connector { width:2px; flex:1; background:linear-gradient(to bottom, var(--border), #e5ddd0); border-radius:1px; min-height:14px; margin:4px 0; }
    .step-item:last-child .step-connector { background:transparent; }
    .step-content { flex:1; background:#fdfbf7; border-radius:var(--radius-sm); padding:10px 14px; border:1px solid #f0ebe0; }
    .step-text { font-size:0.95rem; color:var(--text); line-height:1.6; }
    .step-image { margin-top:10px; max-width:100%; border-radius:8px; border:1px solid #e8e0d5; }

    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-weight:600; margin-bottom:5px; color:var(--text); font-size:0.9rem; letter-spacing:0.02em; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:11px 14px; border:2px solid var(--border); border-radius:var(--radius-sm); font-size:0.95rem; font-family:var(--font-body); background:#fffdf9; color:var(--text); transition:var(--transition); outline:none; resize:vertical; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(199,91,58,0.06); }
    .form-row { display:flex; gap:12px; flex-wrap:wrap; }
    .form-row .form-group { flex:1 1 120px; }
    .steps-editor { border:2px solid var(--border); border-radius:var(--radius-sm); padding:14px; background:#fdfbf7; }
    .step-input-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:12px; background:#fff; padding:8px; border-radius:8px; border:1px solid #efe7da; }
    .step-number-small { width:30px; height:30px; border-radius:50%; background:#f0ebe0; color:var(--text-light); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; flex-shrink:0; margin-top:2px; }
    .step-input-text { flex:1; padding:9px 12px; border:1.5px solid #e8e0d5; border-radius:6px; font-size:0.9rem; font-family:var(--font-body); outline:none; transition:var(--transition); }
    .step-input-text:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(199,91,58,0.05); }
    .step-image-upload { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .step-image-upload label { cursor:pointer; background:#f5f0e9; padding:6px 10px; border-radius:20px; font-size:0.8rem; color:var(--text-light); border:1px solid #ddd6c8; display:flex; align-items:center; gap:4px; transition:0.2s; }
    .step-image-upload label:hover { background:#e8e0d5; color:var(--text); }
    .step-image-preview { width:36px; height:36px; border-radius:6px; object-fit:cover; border:1px solid #d5ccc0; background:#fff; }
    .btn-step-remove { width:30px; height:30px; border-radius:50%; background:transparent; border:1.5px solid #e8d5d0; cursor:pointer; font-size:1rem; color:#c09085; flex-shrink:0; transition:var(--transition); display:flex; align-items:center; justify-content:center; margin-top:2px; }
    .btn-step-remove:hover { background:#fde8e4; color:#c75b3a; border-color:#f0c4b8; }
    .btn-add-step { padding:8px 16px; border-radius:20px; background:transparent; border:1.5px dashed #c5b8a8; cursor:pointer; font-size:0.85rem; color:var(--text-light); transition:var(--transition); font-family:var(--font-body); margin-top:4px; }
    .btn-add-step:hover { border-color:var(--accent); color:var(--accent); background:#fefaf7; }
    .btn-submit { width:100%; padding:13px 20px; border-radius:50px; background:var(--accent); color:#fff; border:none; cursor:pointer; font-size:1rem; font-family:var(--font-body); font-weight:600; letter-spacing:0.03em; transition:var(--transition); box-shadow:0 4px 16px rgba(199,91,58,0.3); margin-top:8px; }
    .btn-submit:hover { background:var(--accent-hover); box-shadow:0 6px 22px rgba(199,91,58,0.4); transform:translateY(-2px); }

    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:#3d322b; color:#fff; padding:12px 24px; border-radius:50px; font-size:0.9rem; z-index:200; transition:transform 0.35s cubic-bezier(0.22,0.61,0.36,1); box-shadow:0 8px 28px rgba(0,0,0,0.25); pointer-events:none; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.success { background:#4a7a48; }
    .toast.error { background:#c75b3a; }

    @media (max-width:768px) {
      .works-grid { grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:18px; }
      .header h1 { font-size:2rem; }
      .toolbar { flex-direction:column; align-items:stretch; gap:10px; padding-bottom:22px; }
      .search-wrapper { max-width:100%; }
      .btn-add { justify-content:center; }
      .modal { max-width:95vw; }
      .card-placeholder { height:160px; font-size:2rem; }
    }
    @media (max-width:480px) {
      .works-grid { grid-template-columns:1fr; }
      .card-placeholder { height:140px; }
    }
  </style>
</head>
<body>
<div class="header-accents" aria-hidden="true">
  <div class="triangle"></div><div class="triangle"></div><div class="triangle"></div><div class="triangle"></div>
</div>

<div class="app-container">
  <header class="header">
    <div class="logo-icon">🦢</div>
    <h1>运仔的折纸作品集</h1>
    <p class="subtitle">每一道折痕，都是时光的印记</p>
    <div class="divider"></div>
  </header>

  <div class="toolbar">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="搜索作品名称..." autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>
    <div class="filter-btns" id="filterBtns">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="简单">简单</button>
      <button class="filter-btn" data-filter="中等">中等</button>
      <button class="filter-btn" data-filter="困难">困难</button>
    </div>
    <button class="btn-add" id="btnAddWork"><span>＋</span> 添加作品</button>
    <button class="btn-reset" id="btnReset">↻ 恢复预设</button>
  </div>

  <div class="works-grid" id="worksGrid"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 详情模态 -->
<div class="modal-overlay" id="detailModal" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal" id="detailModalInner">
    <button class="modal-close" id="detailModalClose" aria-label="关闭">✕</button>
    <div class="modal-content" id="detailModalContent"></div>
  </div>
</div>

<!-- 表单模态 -->
<div class="modal-overlay" id="formModal" style="display:none;" role="dialog" aria-modal="true">
  <div class="modal" id="formModalInner">
    <button class="modal-close" id="formModalClose" aria-label="关闭">✕</button>
    <div class="modal-content">
      <h2>✨ 添加新作品</h2>
      <form id="workForm" autocomplete="off">
        <div class="form-group">
          <label for="workName">作品名称 *</label>
          <input type="text" id="workName" required placeholder="如：千纸鹤、玫瑰、独角兽...">
        </div>
        <div class="form-group">
          <label>作品图片</label>
          <input type="file" id="workImageUpload" accept="image/*" style="padding:8px;">
          <div id="workImagePreview" style="margin-top:8px; display:flex; align-items:center; gap:10px;"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="workDifficulty">难度 *</label>
            <select id="workDifficulty" required>
              <option value="简单">简单 ★☆☆</option>
              <option value="中等" selected>中等 ★★☆</option>
              <option value="困难">困难 ★★★</option>
            </select>
          </div>
          <div class="form-group">
            <label for="workTime">预计时间</label>
            <input type="text" id="workTime" placeholder="如：约15分钟" value="约20分钟">
          </div>
        </div>
        <div class="form-group">
          <label for="workDesc">简短描述</label>
          <textarea id="workDesc" rows="2" placeholder="简单介绍这个折纸作品..."></textarea>
        </div>
        <div class="form-group">
          <label for="workTags">标签（逗号分隔）</label>
          <input type="text" id="workTags" placeholder="如：经典, 动物, 入门">
        </div>
        <div class="form-group">
          <label>折纸步骤（文字 + 图片）</label>
          <div class="steps-editor" id="stepsEditor"></div>
          <button type="button" class="btn-add-step" id="btnAddStep">＋ 添加步骤</button>
        </div>
        <button type="submit" class="btn-submit">📦 保存作品</button>
      </form>
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'origami_works_v2';
    const MAX_IMAGE_SIZE_MB = 1.5; // 单张图片最大MB

    // 预设作品（步骤改为对象数组）
    const PRESET_WORKS = [
      {
        id: 'preset-crane', name: '千纸鹤', difficulty: '中等', time: '约20分钟',
        description: '最经典的折纸作品，象征着和平与希望。据说折满一千只纸鹤就能实现一个愿望。',
        color: '#e8cfc2', imageUrl: '', tags: ['经典','动物','鸟类','祝福'],
        steps: [
          {text:'准备一张正方形纸，将纸对角线对折，压出折痕后展开。', imageUrl:''},
          {text:'换另一条对角线也对折，压出折痕后展开。', imageUrl:''},
          {text:'将纸翻面，沿水平中线对折后展开，再沿垂直中线对折后展开。此时纸上有"米"字形折痕。', imageUrl:''},
          {text:'利用折痕，将纸的四个角向中心聚拢，收拢成一个双正方形。', imageUrl:''},
          {text:'将上层正方形的左右两侧边向中线对折，形成风筝形状。', imageUrl:''},
          {text:'将顶部的小三角形向下折，压出折痕。', imageUrl:''},
          {text:'展开上一步的折叠，将上层纸向上翻起，利用折痕压平——这是"花瓣折"技法。', imageUrl:''},
          {text:'翻面重复步骤5-7。', imageUrl:''},
          {text:'将左右两侧的边再次向中线对折，翻面重复。', imageUrl:''},
          {text:'找到纸鹤的"腿部"，将其中一个尖端向上折起形成头部。', imageUrl:''},
          {text:'轻轻拉动两侧翅膀，让纸鹤身体鼓起来，整理形状。', imageUrl:''},
          {text:'完成！一只优雅的千纸鹤就在你手中了。', imageUrl:''}
        ], createdAt: 1700000000000
      },
      {
        id: 'preset-boat', name: '小纸船', difficulty: '简单', time: '约8分钟',
        description: '童年的经典折纸，简单有趣。折好后可以放在水面上漂浮。',
        color: '#bcd4e6', imageUrl: '', tags: ['经典','入门','童年'],
        steps: [
          {text:'准备一张长方形纸（A4纸的一半比例最佳）。', imageUrl:''},
          {text:'将纸张沿长边对折，压平折痕。', imageUrl:''},
          {text:'再次对折（沿短边），压出折痕后展开，留下中线标记。', imageUrl:''},
          {text:'将两个上角沿中线向下折，形成三角形屋顶。', imageUrl:''},
          {text:'将底部多出的长方形部分向上折起。', imageUrl:''},
          {text:'翻面，另一面的底部也向上折起。', imageUrl:''},
          {text:'从底部打开三角形，压平变成菱形。', imageUrl:''},
          {text:'将菱形底部尖角向上折起约2/3处，翻面同样操作。', imageUrl:''},
          {text:'再次从底部打开，轻轻向两侧拉动，整理成船的形状。', imageUrl:''},
        ], createdAt: 1700000001000
      },
      {
        id: 'preset-butterfly', name: '蝴蝶', difficulty: '中等', time: '约15分钟',
        description: '优雅的纸蝴蝶，翅膀层次分明，可装饰礼物或墙面。',
        color: '#d9c4d4', imageUrl: '', tags: ['经典','昆虫','装饰'],
        steps: [
          {text:'准备正方形纸，沿对角线对折后展开。', imageUrl:''},
          {text:'换另一条对角线对折后展开，形成X形折痕。', imageUrl:''},
          {text:'翻面，沿水平和垂直中线对折后展开。', imageUrl:''},
          {text:'利用折痕收拢成三角形（双三角形基底）。', imageUrl:''},
          {text:'将上层三角形两个角向上折起，形成上翅雏形。', imageUrl:''},
          {text:'翻面，将底部尖角向上折，尖端略微超出顶部。', imageUrl:''},
          {text:'将超出的尖端向下折回一小段形成头部。', imageUrl:''},
          {text:'沿中线对折，将翅膀向两侧展开，微调弧度。', imageUrl:''},
        ], createdAt: 1700000002000
      },
      {
        id: 'preset-frog', name: '跳跳蛙', difficulty: '简单', time: '约10分钟',
        description: '一只会跳的纸青蛙！按压背部就会向前弹跳，趣味十足。',
        color: '#c3d9b7', imageUrl: '', tags: ['动物','互动','趣味'],
        steps: [
          {text:'准备稍硬的正方形纸，沿中线对折成长方形。', imageUrl:''},
          {text:'将长方形上方两个角向下折到中线。', imageUrl:''},
          {text:'将两侧边向中线折，使整体变窄。', imageUrl:''},
          {text:'将底部向上折至中间位置。', imageUrl:''},
          {text:'将左右两个底角向外折出小三角形作为后腿。', imageUrl:''},
          {text:'翻面，顶部尖角向下折一小段形成头部。', imageUrl:''},
          {text:'底部向上折起约1/3，再向下折回一半形成弹簧。', imageUrl:''},
          {text:'翻回正面，按压背部快速松开，青蛙跳跃！', imageUrl:''},
        ], createdAt: 1700000003000
      },
      {
        id: 'preset-airplane', name: '纸飞机', difficulty: '简单', time: '约5分钟',
        description: '经典纸飞机，飞行平稳，掌握好角度能飞很远。',
        color: '#b8cce4', imageUrl: '', tags: ['经典','飞行','童年'],
        steps: [
          {text:'准备A4纸，沿长边对折后展开。', imageUrl:''},
          {text:'上方两个角向中线对折。', imageUrl:''},
          {text:'再次将两侧斜边向中线对折。', imageUrl:''},
          {text:'沿中线对折整个飞机。', imageUrl:''},
          {text:'上层纸向外翻折形成机翼，留约2cm机身。', imageUrl:''},
          {text:'另一侧同样折出对称机翼。', imageUrl:''},
          {text:'机翼末端微微向上弯折约5mm。', imageUrl:''},
          {text:'握住机身底部，以约30度仰角投掷。', imageUrl:''},
        ], createdAt: 1700000004000
      }
    ];

    let works = loadWorks();

    function loadWorks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (Array.isArray(data) && data.length > 0) return data;
        }
      } catch (e) {}
      const init = JSON.parse(JSON.stringify(PRESET_WORKS));
      saveWorks(init);
      return init;
    }
    function saveWorks(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        showToast('存储空间不足，请清理一些作品', 'error');
      }
    }

    const worksGrid = document.getElementById('worksGrid');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.getElementById('filterBtns');
    const btnAddWork = document.getElementById('btnAddWork');
    const btnReset = document.getElementById('btnReset');
    const detailModal = document.getElementById('detailModal');
    const detailModalInner = document.getElementById('detailModalInner');
    const detailModalContent = document.getElementById('detailModalContent');
    const detailModalClose = document.getElementById('detailModalClose');
    const formModal = document.getElementById('formModal');
    const formModalInner = document.getElementById('formModalInner');
    const formModalClose = document.getElementById('formModalClose');
    const workForm = document.getElementById('workForm');
    const stepsEditor = document.getElementById('stepsEditor');
    const btnAddStep = document.getElementById('btnAddStep');
    const toast = document.getElementById('toast');
    const workImageUpload = document.getElementById('workImageUpload');
    const workImagePreview = document.getElementById('workImagePreview');

    let currentFilter = 'all';
    let toastTimer = null;
    let workImageDataUrl = '';

    function showToast(msg, type='') {
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
        toast.className = 'toast';
      }, 2200);
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 渲染作品卡片（无图标emoji）
    function renderWorks(filtered) {
      worksGrid.innerHTML = '';
      if (!filtered.length) {
        worksGrid.innerHTML = `<div class="empty-state"><span class="empty-icon">📭</span><p>还没有作品，快来添加吧！</p></div>`;
        return;
      }
      filtered.forEach(work => {
        const card = document.createElement('div');
        card.className = 'work-card';
        card.setAttribute('data-id', work.id);
        const hasImage = work.imageUrl && work.imageUrl.startsWith('data:');
        const imageHtml = hasImage ? `<img class="card-image" src="${escapeHtml(work.imageUrl)}" alt="${escapeHtml(work.name)}">` : '';
        const placeholderHtml = !hasImage ? `<div class="card-placeholder" style="background-color:${work.color || '#d9c8b4'};">${escapeHtml(work.name).charAt(0)}</div>` : '';
        card.innerHTML = `
          ${imageHtml}${placeholderHtml}
          <button class="card-delete-btn" data-delete-id="${work.id}" title="删除">🗑️</button>
          <div class="card-body">
            <div class="card-name">${escapeHtml(work.name)}</div>
            <div class="card-desc">${escapeHtml(work.description || '一个精美的折纸作品')}</div>
            <div class="card-meta">
              <span class="tag tag-difficulty-${work.difficulty==='简单'?'easy':work.difficulty==='中等'?'medium':'hard'}">${work.difficulty}</span>
              ${work.time?`<span class="tag tag-time">⏱ ${escapeHtml(work.time)}</span>`:''}
              ${work.tags?.slice(0,2).map(t=>`<span class="tag tag-category">${escapeHtml(t)}</span>`).join('')||''}
            </div>
          </div>`;
        card.addEventListener('click', e => {
          if (e.target.closest('.card-delete-btn')) return;
          openDetail(work);
        });
        worksGrid.appendChild(card);
      });
      document.querySelectorAll('.card-delete-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          confirmDelete(btn.getAttribute('data-delete-id'));
        });
      });
    }

    function getFilteredWorks() {
      let filtered = [...works];
      if (currentFilter !== 'all') filtered = filtered.filter(w => w.difficulty === currentFilter);
      const q = searchInput.value.trim().toLowerCase();
      if (q) {
        filtered = filtered.filter(w => w.name.toLowerCase().includes(q) || (w.description||'').toLowerCase().includes(q) || (w.tags||[]).some(t=>t.toLowerCase().includes(q)));
      }
      filtered.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
      return filtered;
    }
    function refreshDisplay() { renderWorks(getFilteredWorks()); }

    function openDetail(work) {
      const diffClass = work.difficulty==='简单'?'easy':work.difficulty==='中等'?'medium':'hard';
      const stepsHtml = (work.steps||[]).map((step,i) => {
        const imgTag = step.imageUrl ? `<img class="step-image" src="${escapeHtml(step.imageUrl)}" alt="步骤${i+1}示意图">` : '';
        return `<div class="step-item">
          <div class="step-number-wrapper"><div class="step-number">${i+1}</div>${i<work.steps.length-1?'<div class="step-connector"></div>':''}</div>
          <div class="step-content"><div class="step-text">${escapeHtml(step.text)}</div>${imgTag}</div>
        </div>`;
      }).join('') || '<p style="color:#9b8c7f;">暂无步骤</p>';

      const imageArea = work.imageUrl
        ? `<div class="modal-image-area"><img src="${escapeHtml(work.imageUrl)}" alt="${escapeHtml(work.name)}"></div>`
        : `<div class="modal-image-area" style="background-color:${work.color||'#d9c8b4'};">${escapeHtml(work.name).charAt(0)}</div>`;

      detailModalContent.innerHTML = `
        ${imageArea}
        <h2>${escapeHtml(work.name)}</h2>
        <div class="modal-meta">
          <span class="tag tag-difficulty-${diffClass}">${work.difficulty}</span>
          ${work.time?`<span class="tag tag-time">⏱ ${escapeHtml(work.time)}</span>`:''}
          ${work.tags?.map(t=>`<span class="tag tag-category">${escapeHtml(t)}</span>`).join('')||''}
        </div>
        ${work.description?`<p class="modal-desc">${escapeHtml(work.description)}</p>`:''}
        <div class="steps-title">📋 折纸步骤（共${work.steps?.length||0}步）</div>
        <div class="steps-timeline">${stepsHtml}</div>`;
      openModal(detailModal, detailModalInner);
    }

    function openModal(overlay, inner) {
      overlay.style.display = 'flex';
      overlay.classList.remove('closing');
      inner.classList.remove('closing');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(overlay, inner) {
      overlay.classList.add('closing');
      inner.classList.add('closing');
      setTimeout(() => {
        overlay.style.display = 'none';
        overlay.classList.remove('closing');
        inner.classList.remove('closing');
        document.body.style.overflow = '';
      }, 220);
    }
    function closeDetail() { closeModal(detailModal, detailModalInner); }
    function closeForm() { closeModal(formModal, formModalInner); }

    detailModalClose.addEventListener('click', closeDetail);
    formModalClose.addEventListener('click', closeForm);
    [detailModal, formModal].forEach(m => m.addEventListener('click', e => { if(e.target===m) m===detailModal?closeDetail():closeForm(); }));
    document.addEventListener('keydown', e => { if(e.key==='Escape') { if(detailModal.style.display==='flex') closeDetail(); if(formModal.style.display==='flex') closeForm(); } });

    // 图片上传预览（作品主图）
    workImageUpload.addEventListener('change', function() {
      const file = this.files[0];
      workImagePreview.innerHTML = '';
      workImageDataUrl = '';
      if (!file) return;
      if (file.size > MAX_IMAGE_SIZE_MB * 1024 * 1024) {
        showToast(`图片不能超过${MAX_IMAGE_SIZE_MB}MB`, 'error');
        this.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = function(e) {
        workImageDataUrl = e.target.result;
        workImagePreview.innerHTML = `<img src="${workImageDataUrl}" style="height:60px; border-radius:8px; border:1px solid #ccc;"> <button type="button" id="removeWorkImage" style="background:none;border:none;color:#c75b3a;cursor:pointer;font-size:0.9rem;">移除</button>`;
        document.getElementById('removeWorkImage')?.addEventListener('click', ()=>{
          workImageDataUrl = '';
          workImageUpload.value = '';
          workImagePreview.innerHTML = '';
        });
      };
      reader.readAsDataURL(file);
    });

    // 步骤编辑器
    function createStepRow(stepData = {text:'', imageUrl:''}, index=0) {
      const row = document.createElement('div');
      row.className = 'step-input-row';
      row.innerHTML = `
        <span class="step-number-small">${index+1}</span>
        <input type="text" class="step-input-text" placeholder="步骤${index+1}描述..." value="${escapeHtml(stepData.text||'')}">
        <div class="step-image-upload">
          <input type="file" accept="image/*" style="display:none;" class="step-file-input">
          <label class="step-upload-label">📷</label>
          ${stepData.imageUrl ? `<img class="step-image-preview" src="${escapeHtml(stepData.imageUrl)}" alt="预览">` : '<span class="step-image-preview" style="display:none;"></span>'}
          <button type="button" class="btn-step-remove" title="移除步骤">−</button>
        </div>`;
      const fileInput = row.querySelector('.step-file-input');
      const previewImg = row.querySelector('.step-image-preview');
      const label = row.querySelector('.step-upload-label');

      label.addEventListener('click', (e) => { e.preventDefault(); fileInput.click(); });
      fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_SIZE_MB * 1024 * 1024) {
          showToast(`步骤图片不能超过${MAX_IMAGE_SIZE_MB}MB`, 'error');
          this.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          previewImg.src = dataUrl;
          previewImg.style.display = 'block';
          row.setAttribute('data-step-image', dataUrl);
        };
        reader.readAsDataURL(file);
      });
      row.querySelector('.btn-step-remove').addEventListener('click', () => {
        if (stepsEditor.querySelectorAll('.step-input-row').length <= 1) {
          showToast('至少保留一个步骤', 'error');
          return;
        }
        row.remove();
        refreshStepNumbers();
      });
      if (stepData.imageUrl) {
        row.setAttribute('data-step-image', stepData.imageUrl);
      }
      return row;
    }

    function refreshStepNumbers() {
      const rows = stepsEditor.querySelectorAll('.step-input-row');
      rows.forEach((row,i) => {
        row.querySelector('.step-number-small').textContent = i+1;
        row.querySelector('.step-input-text').placeholder = `步骤${i+1}描述...`;
      });
    }

    function initStepsEditor(stepsArray = [{text:'',imageUrl:''}, {text:'',imageUrl:''}]) {
      stepsEditor.innerHTML = '';
      stepsArray.forEach((s,i) => stepsEditor.appendChild(createStepRow(s,i)));
    }

    btnAddStep.addEventListener('click', () => {
      const rows = stepsEditor.querySelectorAll('.step-input-row');
      stepsEditor.appendChild(createStepRow({text:'',imageUrl:''}, rows.length));
      const newInput = stepsEditor.lastElementChild.querySelector('.step-input-text');
      if (newInput) newInput.focus();
    });

    function getStepsFromEditor() {
      const rows = stepsEditor.querySelectorAll('.step-input-row');
      return Array.from(rows).map(row => ({
        text: row.querySelector('.step-input-text').value.trim(),
        imageUrl: row.getAttribute('data-step-image') || ''
      })).filter(s => s.text.length > 0);
    }

    function resetForm() {
      workForm.reset();
      document.getElementById('workDifficulty').value = '中等';
      document.getElementById('workTime').value = '约20分钟';
      workImageUpload.value = '';
      workImagePreview.innerHTML = '';
      workImageDataUrl = '';
      initStepsEditor([{text:'',imageUrl:''}, {text:'',imageUrl:''}]);
    }

    workForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('workName').value.trim();
      const difficulty = document.getElementById('workDifficulty').value;
      const time = document.getElementById('workTime').value.trim();
      const desc = document.getElementById('workDesc').value.trim();
      const tagsRaw = document.getElementById('workTags').value.trim();
      const steps = getStepsFromEditor();

      if (!name) { showToast('请输入作品名称','error'); return; }
      if (steps.length === 0) { showToast('请至少添加一个步骤','error'); return; }

      const colorMap = { '简单':'#c3d9b7', '中等':'#e8cfc2', '困难':'#e0c8c8' };
      const newWork = {
        id: 'user-'+Date.now(),
        name, difficulty, time, description: desc,
        color: colorMap[difficulty] || '#d9c8b4',
        imageUrl: workImageDataUrl,
        tags: tagsRaw ? tagsRaw.split(/[,，]/).map(t=>t.trim()).filter(t=>t) : [],
        steps,
        createdAt: Date.now()
      };
      works.unshift(newWork);
      saveWorks(works);
      refreshDisplay();
      closeForm();
      showToast('✅ 作品添加成功！', 'success');
      resetForm();
    });

    function confirmDelete(id) {
      const work = works.find(w=>w.id===id);
      if (!work) return;
      if (confirm(`确定要删除「${work.name}」吗？\n此操作不可恢复。`)) {
        works = works.filter(w=>w.id!==id);
        saveWorks(works);
        refreshDisplay();
        showToast('已删除「'+work.name+'」', '');
      }
    }

    searchInput.addEventListener('input', refreshDisplay);
    filterBtns.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      filterBtns.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      refreshDisplay();
    });

    btnAddWork.addEventListener('click', ()=>{ resetForm(); openModal(formModal, formModalInner); });

    btnReset.addEventListener('click', ()=>{
      if (confirm('确定恢复预设作品数据吗？当前作品将被替换。')) {
        works = JSON.parse(JSON.stringify(PRESET_WORKS));
        saveWorks(works);
        searchInput.value = '';
        currentFilter = 'all';
        filterBtns.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        filterBtns.querySelector('[data-filter="all"]').classList.add('active');
        refreshDisplay();
        showToast('✅ 预设作品已恢复','success');
      }
    });

    function init() {
      refreshDisplay();
      resetForm();
      formModal.style.display = 'none';
      detailModal.style.display = 'none';
    }
    init();
    console.log('🦢 折纸作品集已启动 (图文步骤版)');
  })();
</script>
</body>
</html>
