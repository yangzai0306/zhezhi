<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>折纸作品集 · 图文步骤</title>
  <style>
    :root {
      --bg: #faf7f2;
      --card-bg: #ffffff;
      --text: #3d322b;
      --text-light: #6b5e53;
      --text-lighter: #9b8c7f;
      --accent: #c75b3a;
      --accent-hover: #a8432a;
      --border: #e8e0d5;
      --shadow-sm: 0 2px 8px rgba(61,50,43,0.06);
      --shadow-md: 0 6px 24px rgba(61,50,43,0.10);
      --shadow-lg: 0 16px 48px rgba(61,50,43,0.14);
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --transition: 0.28s cubic-bezier(0.4,0,0.2,1);
      --font-heading: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
      --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 15% 10%, rgba(212,168,83,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, rgba(199,91,58,0.05) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
    }
    .header-accents { position:fixed; top:0; left:0; width:100%; pointer-events:none; z-index:0; opacity:0.55; }
    .header-accents .triangle {
      position:absolute; width:0; height:0;
      border-left:22px solid transparent; border-right:22px solid transparent;
      border-bottom:38px solid rgba(199,91,58,0.13);
      animation: floatTriangle 14s ease-in-out infinite;
    }
    .header-accents .triangle:nth-child(1){ top:60px; left:8%; }
    .header-accents .triangle:nth-child(2){ top:130px; right:10%; animation-delay:-5s; border-left-width:16px; border-right-width:16px; border-bottom-width:28px; }
    .header-accents .triangle:nth-child(3){ top:200px; left:18%; animation-delay:-9s; border-left-width:18px; border-right-width:18px; border-bottom-width:32px; }
    .header-accents .triangle:nth-child(4){ top:90px; right:22%; animation-delay:-3s; border-left-width:14px; border-right-width:14px; border-bottom-width:24px; }
    @keyframes floatTriangle { 0%,100%{transform:translateY(0) rotate(0deg);} 25%{transform:translateY(-18px) rotate(3deg);} 50%{transform:translateY(-6px) rotate(-2deg);} 75%{transform:translateY(-22px) rotate(1deg);} }

    .app-container { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 20px; flex:1; }
    .header { text-align:center; padding:48px 20px 28px; }
    .header .logo-icon { font-size:56px; display:inline-block; animation:gentleBounce 3s ease-in-out infinite; filter:drop-shadow(0 4px 12px rgba(199,91,58,0.2)); }
    @keyframes gentleBounce { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-14px);} 50%{transform:translateY(0);} 70%{transform:translateY(-7px);} }
    .header h1 { font-family:var(--font-heading); font-size:2.6rem; font-weight:700; color:var(--text); margin:10px 0 6px; }
    .header .subtitle { font-size:1.05rem; color:var(--text-light); }
    .header .divider { display:inline-block; width:50px; height:3px; background:var(--accent); border-radius:2px; margin-top:14px; opacity:0.7; }

    .toolbar { display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:12px; padding:8px 0 32px; }
    .search-wrapper { position:relative; flex:1 1 240px; max-width:360px; }
    .search-wrapper input { width:100%; padding:12px 16px 12px 44px; border:2px solid var(--border); border-radius:50px; font-size:0.95rem; background:var(--card-bg); transition:var(--transition); outline:none; }
    .search-wrapper input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(199,91,58,0.08); }
    .search-wrapper .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:1.1rem; color:var(--text-lighter); pointer-events:none; }
    .filter-btns { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-btn { padding:9px 18px; border:2px solid var(--border); border-radius:50px; background:var(--card-bg); cursor:pointer; font-size:0.9rem; color:var(--text-light); transition:var(--transition); font-weight:500; }
    .filter-btn:hover { border-color:var(--accent); color:var(--accent); background:#fefaf7; }
    .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 10px rgba(199,91,58,0.25); }

    .works-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(310px, 1fr)); gap:26px; padding-bottom:40px; }
    .work-card { background:var(--card-bg); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:var(--transition); box-shadow:var(--shadow-sm); border:1px solid var(--border); display:flex; flex-direction:column; height:100%; }
    .work-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-6px); border-color:#dcd3c5; }
    .card-image { width:100%; height:200px; object-fit:cover; background:#f5f0e9; }
    .card-placeholder { width:100%; height:200px; display:flex; align-items:center; justify-content:center; font-size:2.4rem; font-weight:700; color:#fff; background:#d9c8b4; }
    .card-body { padding:18px 20px 20px; flex:1; display:flex; flex-direction:column; gap:8px; }
    .card-name { font-family:var(--font-heading); font-size:1.25rem; font-weight:700; }
    .card-desc { font-size:0.9rem; color:var(--text-light); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-meta { display:flex; flex-wrap:wrap; gap:8px; font-size:0.82rem; color:var(--text-lighter); }
    .tag { padding:4px 10px; border-radius:20px; font-size:0.75rem; font-weight:500; }
    .tag-easy { background:#eaf5e8; color:#4a7a48; }
    .tag-medium { background:#fdf3df; color:#9b7a30; }
    .tag-hard { background:#fde8e4; color:#a84a35; }
    .tag-time { background:#f3f0eb; color:#6b5e53; }
    .tag-category { background:#eef3f8; color:#4a6580; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--text-lighter); grid-column:1/-1; }
    .empty-state .empty-icon { font-size:80px; display:block; margin-bottom:16px; opacity:0.7; }

    .modal-overlay { position:fixed; inset:0; background:rgba(40,30,22,0.55); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.25s; backdrop-filter:blur(2px); }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .modal { background:#fffdf9; border-radius:var(--radius-lg); max-width:620px; width:100%; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:slideUp 0.32s; border:1px solid var(--border); }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    .modal-close { position:sticky; top:16px; float:right; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.9); border:1px solid var(--border); cursor:pointer; font-size:1.2rem; color:var(--text-light); z-index:5; display:flex; align-items:center; justify-content:center; margin-right:8px; }
    .modal-close:hover { background:#fde8e4; color:var(--accent); }
    .modal-content { padding:10px 28px 32px; }
    .modal-content h2 { font-family:var(--font-heading); font-size:1.75rem; margin-bottom:6px; color:var(--text); padding-right:40px; }
    .modal-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .modal-desc { color:var(--text-light); margin-bottom:20px; font-size:0.95rem; }
    .modal-image-area { width:100%; height:200px; border-radius:var(--radius); overflow:hidden; margin-bottom:20px; background:#f5f0e9; display:flex; align-items:center; justify-content:center; font-size:2.4rem; color:#fff; }
    .modal-image-area img { width:100%; height:100%; object-fit:cover; }
    .steps-title { font-family:var(--font-heading); font-size:1.2rem; font-weight:700; margin-bottom:16px; }
    .step-item { display:flex; gap:18px; padding-bottom:22px; }
    .step-number { width:36px; height:36px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
    .step-connector { width:2px; flex:1; background:#e5ddd0; margin:4px 0; }
    .step-item:last-child .step-connector { background:transparent; }
    .step-content { flex:1; background:#fdfbf7; border-radius:8px; padding:10px 14px; border:1px solid #f0ebe0; }
    .step-text { font-size:0.95rem; color:var(--text); }
    .step-image { margin-top:10px; max-width:100%; border-radius:8px; border:1px solid #e8e0d5; }

    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#3d322b; color:#fff; padding:12px 24px; border-radius:50px; z-index:200; transition:0.35s; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.success { background:#4a7a48; }
    .toast.error { background:#c75b3a; }

    .site-footer { text-align:center; padding:24px 20px 32px; color:var(--text-lighter); font-size:0.9rem; border-top:1px solid var(--border); margin-top:20px; }
    .site-footer a { color:var(--accent); text-decoration:none; font-weight:500; }
    .site-footer a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="header-accents" aria-hidden="true">
  <div class="triangle"></div><div class="triangle"></div><div class="triangle"></div><div class="triangle"></div>
</div>

<div class="app-container">
  <header class="header">
    <div class="logo-icon">🦢</div>
    <h1>折纸作品集</h1>
    <p class="subtitle">每一道折痕，都是时光的印记</p>
    <div class="divider"></div>
  </header>

  <div class="toolbar">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="搜索作品名称..." autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>
    <div class="filter-btns" id="filterBtns">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="简单">简单</button>
      <button class="filter-btn" data-filter="中等">中等</button>
      <button class="filter-btn" data-filter="困难">困难</button>
    </div>
  </div>

  <div class="works-grid" id="worksGrid"></div>

  <footer class="site-footer">
    <p>Contact us: <a href="mailto:359283484@qq.com">359283484@qq.com</a></p>
  </footer>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="detailModal" style="display:none;">
  <div class="modal" id="detailModalInner">
    <button class="modal-close" id="detailModalClose">✕</button>
    <div class="modal-content" id="detailModalContent"></div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'origami_works_v2';

    function loadWorks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e){}
      return [];
    }

    let works = loadWorks();

    const worksGrid = document.getElementById('worksGrid');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.getElementById('filterBtns');
    const detailModal = document.getElementById('detailModal');
    const detailContent = document.getElementById('detailModalContent');
    const toast = document.getElementById('toast');
    let currentFilter = 'all';
    let toastTimer;

    function showToast(msg, type='') {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      toastTimer = setTimeout(() => toast.className = 'toast', 2200);
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function renderWorks(filtered) {
      worksGrid.innerHTML = '';
      if (!filtered.length) {
        worksGrid.innerHTML = `<div class="empty-state"><span class="empty-icon">📭</span><p>还没有作品</p></div>`;
        return;
      }
      filtered.forEach(work => {
        const card = document.createElement('div');
        card.className = 'work-card';
        const hasImg = work.imageUrl && work.imageUrl.startsWith('data:');
        card.innerHTML = `
          ${hasImg ? `<img class="card-image" src="${escapeHtml(work.imageUrl)}" alt="${escapeHtml(work.name)}">` : ''}
          ${!hasImg ? `<div class="card-placeholder" style="background:${work.color||'#d9c8b4'}">${escapeHtml(work.name).charAt(0)}</div>` : ''}
          <div class="card-body">
            <div class="card-name">${escapeHtml(work.name)}</div>
            <div class="card-desc">${escapeHtml(work.description||'')}</div>
            <div class="card-meta">
              <span class="tag tag-${work.difficulty==='简单'?'easy':work.difficulty==='中等'?'medium':'hard'}">${work.difficulty}</span>
              ${work.time?`<span class="tag tag-time">⏱ ${escapeHtml(work.time)}</span>`:''}
              ${work.tags?.slice(0,2).map(t=>`<span class="tag tag-category">${escapeHtml(t)}</span>`).join('')||''}
            </div>
          </div>`;
        card.addEventListener('click', () => openDetail(work));
        worksGrid.appendChild(card);
      });
    }

    function getFilteredWorks() {
      let filtered = [...works];
      if (currentFilter !== 'all') filtered = filtered.filter(w => w.difficulty === currentFilter);
      const q = searchInput.value.trim().toLowerCase();
      if (q) filtered = filtered.filter(w =>
        w.name.toLowerCase().includes(q) ||
        (w.description||'').toLowerCase().includes(q) ||
        (w.tags||[]).some(t=>t.toLowerCase().includes(q))
      );
      return filtered.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
    }

    function refreshDisplay() {
      works = loadWorks(); // 每次刷新时重新读取，以捕获管理页面的更改
      renderWorks(getFilteredWorks());
    }

    function openDetail(work) {
      const stepsHtml = (work.steps||[]).map((s,i) => `
        <div class="step-item">
          <div class="step-number">${i+1}</div>
          <div class="step-content">
            <div class="step-text">${escapeHtml(s.text)}</div>
            ${s.imageUrl ? `<img class="step-image" src="${escapeHtml(s.imageUrl)}">` : ''}
          </div>
        </div>`).join('');
      detailContent.innerHTML = `
        ${work.imageUrl ? `<div class="modal-image-area"><img src="${escapeHtml(work.imageUrl)}"></div>` : `<div class="modal-image-area" style="background:${work.color||'#d9c8b4'}">${escapeHtml(work.name).charAt(0)}</div>`}
        <h2>${escapeHtml(work.name)}</h2>
        <div class="modal-meta"><span class="tag tag-${work.difficulty==='简单'?'easy':work.difficulty==='中等'?'medium':'hard'}">${work.difficulty}</span> ${work.time?`<span class="tag tag-time">⏱ ${work.time}</span>`:''}</div>
        <p class="modal-desc">${escapeHtml(work.description||'')}</p>
        <div class="steps-title">📋 步骤 (${work.steps?.length||0})</div>
        <div>${stepsHtml||'<p>暂无步骤</p>'}</div>`;
      detailModal.style.display = 'flex';
    }

    function closeDetail() { detailModal.style.display = 'none'; }
    document.getElementById('detailModalClose').addEventListener('click', closeDetail);
    detailModal.addEventListener('click', e => { if(e.target===detailModal) closeDetail(); });

    searchInput.addEventListener('input', refreshDisplay);
    filterBtns.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      filterBtns.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      refreshDisplay();
    });

    document.addEventListener('keydown', e => {
      if (e.key==='Escape' && detailModal.style.display==='flex') closeDetail();
    });

    // 初始化
    refreshDisplay();
  })();
</script>
</body>
</html>
