<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>折纸作品管理 · 后台</title>
  <style>
    /* 所有样式与之前相同，此处省略以节省篇幅，请保留你原来 admin.html 中的完整样式 */
    /* ... 复制你原来 admin.html 中 <style> 的全部内容 ... */
  </style>
  <style>
    /* 新增：初始隐藏主内容，密码通过后才显示 */
    #mainContent {
      display: none;
    }
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    }
    .auth-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .auth-box h3 {
      margin-bottom: 20px;
      color: #3d322b;
    }
    .auth-box input {
      padding: 12px 16px;
      border: 2px solid #e8e0d5;
      border-radius: 8px;
      font-size: 1rem;
      width: 200px;
      outline: none;
    }
    .auth-box button {
      margin-top: 15px;
      padding: 10px 28px;
      background: #c75b3a;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    .auth-error {
      color: #c75b3a;
      margin-top: 10px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <!-- 密码验证浮层 -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-box">
      <h3>🔐 管理员验证</h3>
      <input type="password" id="passwordInput" placeholder="请输入密码" autofocus>
      <br>
      <button id="authSubmit">进入管理</button>
      <p class="auth-error" id="authError">密码错误，请重试</p>
    </div>
  </div>

  <!-- 原始内容容器 -->
  <div id="mainContent">
    <div class="header-accents" aria-hidden="true">
      <div class="triangle"></div><div class="triangle"></div><div class="triangle"></div><div class="triangle"></div>
    </div>

    <div class="app-container">
      <header class="header">
        <div class="logo-icon">🦢</div>
        <h1>折纸作品管理</h1>
        <p class="subtitle">添加、编辑、删除你的折纸作品</p>
        <div class="divider"></div>
      </header>

      <div class="toolbar">
        <div class="search-wrapper">
          <input type="text" id="searchInput" placeholder="搜索作品名称..." autocomplete="off">
          <span class="search-icon">🔍</span>
        </div>
        <div class="filter-btns" id="filterBtns">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="简单">简单</button>
          <button class="filter-btn" data-filter="中等">中等</button>
          <button class="filter-btn" data-filter="困难">困难</button>
        </div>
        <button class="btn-add" id="btnAddWork"><span>＋</span> 添加作品</button>
        <button class="btn-reset" id="btnReset">↻ 恢复预设</button>
      </div>

      <div class="works-grid" id="worksGrid"></div>

      <footer class="site-footer">
        <p>Contact us: <a href="mailto:359283484@qq.com">359283484@qq.com</a></p>
      </footer>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="detailModal" style="display:none;">
      <div class="modal" id="detailModalInner">
        <button class="modal-close" id="detailModalClose">✕</button>
        <div class="modal-content" id="detailModalContent"></div>
      </div>
    </div>

    <div class="modal-overlay" id="formModal" style="display:none;">
      <div class="modal" id="formModalInner">
        <button class="modal-close" id="formModalClose">✕</button>
        <div class="modal-content">
          <h2 id="formModalTitle">✨ 添加新作品</h2>
          <form id="workForm" autocomplete="off">
            <div class="form-group"><label>作品名称 *</label><input type="text" id="workName" required placeholder="如：千纸鹤"></div>
            <div class="form-group"><label>作品图片</label><input type="file" id="workImageUpload" accept="image/*"><div id="workImagePreview" style="margin-top:8px;"></div></div>
            <div class="form-row">
              <div class="form-group"><label>难度 *</label><select id="workDifficulty"><option value="简单">简单</option><option value="中等" selected>中等</option><option value="困难">困难</option></select></div>
              <div class="form-group"><label>预计时间</label><input type="text" id="workTime" value="约20分钟"></div>
            </div>
            <div class="form-group"><label>简短描述</label><textarea id="workDesc" rows="2"></textarea></div>
            <div class="form-group"><label>标签（逗号分隔）</label><input type="text" id="workTags"></div>
            <div class="form-group"><label>折纸步骤（文字 + 图片）</label><div class="steps-editor" id="stepsEditor"></div><button type="button" class="btn-add-step" id="btnAddStep">＋ 添加步骤</button></div>
            <button type="submit" class="btn-submit">📦 保存作品</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ---------- 密码验证逻辑 ----------
    // 密码 "cqmyg" 的 SHA-256 哈希值（提前计算好）
    const PASSWORD_HASH = 'e863e149fd8d10a0ea94fa96fcb8b30b589c771a9ca97ccf907aec9635adb4ba';

    async function sha256(message) {
      const encoder = new TextEncoder();
      const data = encoder.encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('authSubmit').addEventListener('click', async () => {
      const input = document.getElementById('passwordInput').value;
      if (!input) return;
      const hash = await sha256(input);
      if (hash === PASSWORD_HASH) {
        // 密码正确，隐藏验证层，显示管理界面
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        initAdminApp(); // 启动管理功能
      } else {
        document.getElementById('authError').style.display = 'block';
        document.getElementById('passwordInput').value = '';
      }
    });

    // 支持回车键提交
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('authSubmit').click();
    });

    // ---------- 管理后台功能（与之前完全相同）----------
    function initAdminApp() {
      const STORAGE_KEY = 'origami_works_v2';
      const MAX_IMAGE_MB = 1.5;

      const PRESET_WORKS = [
        { id:'preset-crane', name:'千纸鹤', difficulty:'中等', time:'约20分钟', description:'最经典的折纸作品，象征和平与希望。', color:'#e8cfc2', imageUrl:'', tags:['经典','动物'], steps:[{text:'准备正方形纸，对角线对折后展开。',imageUrl:''},{text:'换另一条对角线对折后展开。',imageUrl:''},{text:'翻面，沿水平和垂直中线对折后展开，形成米字折痕。',imageUrl:''},{text:'收拢成双正方形。',imageUrl:''},{text:'上层左右侧边向中线对折。',imageUrl:''},{text:'顶部小三角向下折。',imageUrl:''},{text:'展开并翻起上层纸（花瓣折）。',imageUrl:''},{text:'翻面重复步骤5-7。',imageUrl:''},{text:'两侧边再次向中线对折，翻面重复。',imageUrl:''},{text:'将一端尖角向上折成头部。',imageUrl:''},{text:'拉动翅膀整形。',imageUrl:''}], createdAt:1700000000 },
        { id:'preset-boat', name:'小纸船', difficulty:'简单', time:'约8分钟', description:'童年经典，可漂浮水面。', color:'#bcd4e6', tags:['经典','入门'], steps:[{text:'长方形纸沿长边对折。',imageUrl:''},{text:'再对折后展开留下中线。',imageUrl:''},{text:'两上角向中线折。',imageUrl:''},{text:'底部向上折起。',imageUrl:''},{text:'翻面同样折起。',imageUrl:''},{text:'从底部打开压成菱形。',imageUrl:''},{text:'底部尖角向上折。',imageUrl:''},{text:'拉开整理成船。',imageUrl:''}], createdAt:1700001000 },
        { id:'preset-butterfly', name:'蝴蝶', difficulty:'中等', time:'约15分钟', description:'优雅纸蝴蝶，翅膀层次分明。', color:'#d9c4d4', tags:['昆虫','装饰'], steps:[{text:'正方形纸对角线对折。',imageUrl:''},{text:'换对角线对折。',imageUrl:''},{text:'翻面水平垂直对折。',imageUrl:''},{text:'收拢成三角形。',imageUrl:''},{text:'上层两角向上折。',imageUrl:''},{text:'翻面底部尖角向上折。',imageUrl:''},{text:'尖端折回形成头部。',imageUrl:''},{text:'对折展开翅膀。',imageUrl:''}], createdAt:1700002000 }
      ];

      function loadWorks() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch(e){}
        const init = JSON.parse(JSON.stringify(PRESET_WORKS));
        saveWorks(init);
        return init;
      }
      function saveWorks(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

      let works = loadWorks();
      let currentEditWorkId = null;

      const worksGrid = document.getElementById('worksGrid');
      const searchInput = document.getElementById('searchInput');
      const filterBtns = document.getElementById('filterBtns');
      const btnAddWork = document.getElementById('btnAddWork');
      const btnReset = document.getElementById('btnReset');
      const detailModal = document.getElementById('detailModal');
      const detailContent = document.getElementById('detailModalContent');
      const formModal = document.getElementById('formModal');
      const formModalTitle = document.getElementById('formModalTitle');
      const workForm = document.getElementById('workForm');
      const stepsEditor = document.getElementById('stepsEditor');
      const toast = document.getElementById('toast');
      const workImageUpload = document.getElementById('workImageUpload');
      const workImagePreview = document.getElementById('workImagePreview');
      let currentFilter = 'all', toastTimer, workImageDataUrl = '';

      function showToast(msg, type='') {
        clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.className = 'toast ' + type + ' show';
        toastTimer = setTimeout(() => toast.className = 'toast', 2200);
      }
      function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

      function renderWorks(filtered) {
        worksGrid.innerHTML = '';
        if (!filtered.length) {
          worksGrid.innerHTML = `<div class="empty-state"><span class="empty-icon">📭</span><p>还没有作品</p></div>`;
          return;
        }
        filtered.forEach(work => {
          const card = document.createElement('div');
          card.className = 'work-card';
          const hasImg = work.imageUrl && work.imageUrl.startsWith('data:');
          card.innerHTML = `
            ${hasImg ? `<img class="card-image" src="${escapeHtml(work.imageUrl)}" alt="${escapeHtml(work.name)}">` : ''}
            ${!hasImg ? `<div class="card-placeholder" style="background:${work.color||'#d9c8b4'}">${escapeHtml(work.name).charAt(0)}</div>` : ''}
            <div class="card-actions">
              <button class="card-edit-btn" data-edit-id="${work.id}" title="编辑">✏️</button>
              <button class="card-delete-btn" data-delete-id="${work.id}" title="删除">🗑️</button>
            </div>
            <div class="card-body">
              <div class="card-name">${escapeHtml(work.name)}</div>
              <div class="card-desc">${escapeHtml(work.description||'')}</div>
              <div class="card-meta">
                <span class="tag tag-${work.difficulty==='简单'?'easy':work.difficulty==='中等'?'medium':'hard'}">${work.difficulty}</span>
                ${work.time?`<span class="tag tag-time">⏱ ${escapeHtml(work.time)}</span>`:''}
                ${work.tags?.slice(0,2).map(t=>`<span class="tag tag-category">${escapeHtml(t)}</span>`).join('')||''}
              </div>
            </div>`;
          card.addEventListener('click', e => {
            if (e.target.closest('.card-actions')) return;
            openDetail(work);
          });
          worksGrid.appendChild(card);
        });

        document.querySelectorAll('.card-edit-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            const id = btn.dataset.editId;
            const work = works.find(w => w.id === id);
            if (work) openEditForm(work);
          });
        });
        document.querySelectorAll('.card-delete-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            confirmDelete(btn.dataset.deleteId);
          });
        });
      }

      function getFilteredWorks() {
        let filtered = [...works];
        if (currentFilter !== 'all') filtered = filtered.filter(w => w.difficulty === currentFilter);
        const q = searchInput.value.trim().toLowerCase();
        if (q) filtered = filtered.filter(w => w.name.toLowerCase().includes(q) || (w.description||'').toLowerCase().includes(q) || (w.tags||[]).some(t=>t.toLowerCase().includes(q)));
        return filtered.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
      }
      function refreshDisplay() { renderWorks(getFilteredWorks()); }

      function openDetail(work) {
        const stepsHtml = (work.steps||[]).map((s,i) => `
          <div class="step-item">
            <div class="step-number">${i+1}</div>
            <div class="step-content">
              <div class="step-text">${escapeHtml(s.text)}</div>
              ${s.imageUrl ? `<img class="step-image" src="${escapeHtml(s.imageUrl)}">` : ''}
            </div>
          </div>`).join('');
        detailContent.innerHTML = `
          ${work.imageUrl ? `<div class="modal-image-area"><img src="${escapeHtml(work.imageUrl)}"></div>` : `<div class="modal-image-area" style="background:${work.color||'#d9c8b4'}">${escapeHtml(work.name).charAt(0)}</div>`}
          <h2>${escapeHtml(work.name)}</h2>
          <div class="modal-meta"><span class="tag tag-${work.difficulty==='简单'?'easy':work.difficulty==='中等'?'medium':'hard'}">${work.difficulty}</span> ${work.time?`<span class="tag tag-time">⏱ ${work.time}</span>`:''}</div>
          <button class="detail-edit-btn" id="detailEditBtn">✏️ 编辑作品</button>
          <p class="modal-desc">${escapeHtml(work.description||'')}</p>
          <div class="steps-title">📋 步骤 (${work.steps?.length||0})</div>
          <div>${stepsHtml||'<p>暂无步骤</p>'}</div>`;
        document.getElementById('detailEditBtn').addEventListener('click', () => {
          closeDetail();
          openEditForm(work);
        });
        detailModal.style.display = 'flex';
      }

      function closeDetail() { detailModal.style.display = 'none'; }
      document.getElementById('detailModalClose').addEventListener('click', closeDetail);
      detailModal.addEventListener('click', e => { if(e.target===detailModal) closeDetail(); });

      function openAddForm() {
        currentEditWorkId = null;
        formModalTitle.textContent = '✨ 添加新作品';
        resetForm();
        formModal.style.display = 'flex';
      }
      function openEditForm(work) {
        currentEditWorkId = work.id;
        formModalTitle.textContent = '✏️ 编辑作品';
        populateForm(work);
        formModal.style.display = 'flex';
      }

      function populateForm(work) {
        document.getElementById('workName').value = work.name || '';
        document.getElementById('workDifficulty').value = work.difficulty || '中等';
        document.getElementById('workTime').value = work.time || '';
        document.getElementById('workDesc').value = work.description || '';
        document.getElementById('workTags').value = (work.tags || []).join(', ');

        workImageDataUrl = work.imageUrl || '';
        workImageUpload.value = '';
        workImagePreview.innerHTML = '';
        if (workImageDataUrl) {
          workImagePreview.innerHTML = `<img src="${workImageDataUrl}" style="height:60px;border-radius:8px;"> <button type="button" id="removeWorkImage">移除</button>`;
          document.getElementById('removeWorkImage').onclick = () => {
            workImageDataUrl = '';
            workImageUpload.value = '';
            workImagePreview.innerHTML = '';
          };
        }

        const steps = work.steps && work.steps.length ? work.steps : [{text:'',imageUrl:''}];
        stepsEditor.innerHTML = '';
        steps.forEach((s, i) => stepsEditor.appendChild(createStepRow(s, i)));
      }

      function resetForm() {
        workForm.reset();
        document.getElementById('workDifficulty').value = '中等';
        document.getElementById('workTime').value = '约20分钟';
        workImageUpload.value = '';
        workImagePreview.innerHTML = '';
        workImageDataUrl = '';
        currentEditWorkId = null;
        stepsEditor.innerHTML = '';
        stepsEditor.appendChild(createStepRow({text:'',imageUrl:''}, 0));
        stepsEditor.appendChild(createStepRow({text:'',imageUrl:''}, 1));
      }

      function closeForm() { formModal.style.display = 'none'; }
      document.getElementById('formModalClose').addEventListener('click', closeForm);
      formModal.addEventListener('click', e => { if(e.target===formModal) closeForm(); });

      workImageUpload.addEventListener('change', function() {
        const file = this.files[0];
        workImagePreview.innerHTML = '';
        if (!file) {
          if (currentEditWorkId) {
            const work = works.find(w => w.id === currentEditWorkId);
            if (work && work.imageUrl) {
              workImageDataUrl = work.imageUrl;
              workImagePreview.innerHTML = `<img src="${workImageDataUrl}" style="height:60px;border-radius:8px;"> <button type="button" id="removeWorkImage">移除</button>`;
              document.getElementById('removeWorkImage').onclick = () => {
                workImageDataUrl = '';
                workImageUpload.value = '';
                workImagePreview.innerHTML = '';
              };
            } else {
              workImageDataUrl = '';
            }
          } else {
            workImageDataUrl = '';
          }
          return;
        }
        if (file.size > MAX_IMAGE_MB*1024*1024) { showToast('图片过大','error'); return; }
        const reader = new FileReader();
        reader.onload = e => {
          workImageDataUrl = e.target.result;
          workImagePreview.innerHTML = `<img src="${workImageDataUrl}" style="height:60px;border-radius:8px;"> <button type="button" id="removeWorkImage">移除</button>`;
          document.getElementById('removeWorkImage').onclick = () => {
            workImageDataUrl = '';
            workImageUpload.value = '';
            workImagePreview.innerHTML = '';
          };
        };
        reader.readAsDataURL(file);
      });

      function createStepRow(data={text:'',imageUrl:''}, idx=0) {
        const row = document.createElement('div');
        row.className = 'step-input-row';
        row.innerHTML = `<span class="step-number-small">${idx+1}</span>
          <input type="text" class="step-input-text" placeholder="步骤${idx+1}..." value="${escapeHtml(data.text)}">
          <div class="step-image-upload">
            <input type="file" accept="image/*" style="display:none" class="step-file">
            <label>📷</label>
            ${data.imageUrl ? `<img class="step-image-preview" src="${escapeHtml(data.imageUrl)}" style="width:36px;height:36px;border-radius:6px;">` : '<span class="step-image-preview" style="display:none;"></span>'}
            <button type="button" class="btn-step-remove">−</button>
          </div>`;
        const fileInput = row.querySelector('.step-file');
        const preview = row.querySelector('.step-image-preview');
        const label = row.querySelector('label');

        if (data.imageUrl) row.setAttribute('data-step-image', data.imageUrl);

        label.addEventListener('click', (e) => { e.preventDefault(); fileInput.click(); });
        fileInput.addEventListener('change', function() {
          const f = this.files[0];
          if (!f) return;
          if (f.size > MAX_IMAGE_MB*1024*1024) { showToast('图片过大','error'); return; }
          const r = new FileReader();
          r.onload = ev => {
            row.setAttribute('data-step-image', ev.target.result);
            preview.src = ev.target.result;
            preview.style.display = 'block';
          };
          r.readAsDataURL(f);
        });
        row.querySelector('.btn-step-remove').addEventListener('click', () => {
          if (stepsEditor.children.length <= 1) { showToast('至少保留一步','error'); return; }
          row.remove();
          refreshStepNums();
        });
        return row;
      }

      function refreshStepNums() {
        [...stepsEditor.children].forEach((r, i) => {
          r.querySelector('.step-number-small').textContent = i+1;
          r.querySelector('.step-input-text').placeholder = `步骤${i+1}...`;
        });
      }

      document.getElementById('btnAddStep').addEventListener('click', () => {
        stepsEditor.appendChild(createStepRow({}, stepsEditor.children.length));
      });

      function getStepsFromEditor() {
        return [...stepsEditor.children].map(row => ({
          text: row.querySelector('.step-input-text').value.trim(),
          imageUrl: row.getAttribute('data-step-image') || ''
        })).filter(s => s.text);
      }

      workForm.addEventListener('submit', e => {
        e.preventDefault();
        const name = document.getElementById('workName').value.trim();
        const steps = getStepsFromEditor();
        if (!name) { showToast('请输入名称','error'); return; }
        if (!steps.length) { showToast('至少添加一个步骤','error'); return; }

        const colorMap = { '简单':'#c3d9b7', '中等':'#e8cfc2', '困难':'#e0c8c8' };
        const workData = {
          name,
          difficulty: document.getElementById('workDifficulty').value,
          time: document.getElementById('workTime').value.trim(),
          description: document.getElementById('workDesc').value.trim(),
          color: colorMap[document.getElementById('workDifficulty').value] || '#d9c8b4',
          imageUrl: workImageDataUrl,
          tags: document.getElementById('workTags').value.split(/[,，]/).map(t=>t.trim()).filter(t=>t),
          steps,
        };

        if (currentEditWorkId) {
          const index = works.findIndex(w => w.id === currentEditWorkId);
          if (index !== -1) {
            works[index] = { ...works[index], ...workData };
            saveWorks(works);
            refreshDisplay();
            closeForm();
            showToast('✅ 作品已更新','success');
          } else {
            showToast('找不到该作品','error');
          }
        } else {
          const newWork = { ...workData, id: 'user-'+Date.now(), createdAt: Date.now() };
          works.unshift(newWork);
          saveWorks(works);
          refreshDisplay();
          closeForm();
          showToast('✅ 作品添加成功','success');
        }
        resetForm();
      });

      function confirmDelete(id) {
        const w = works.find(w=>w.id===id);
        if (w && confirm(`确定删除「${w.name}」？`)) {
          works = works.filter(w=>w.id!==id);
          saveWorks(works);
          refreshDisplay();
          showToast('已删除','');
        }
      }

      btnAddWork.addEventListener('click', openAddForm);
      btnReset.addEventListener('click', () => {
        if (confirm('恢复预设作品？当前数据将被替换。')) {
          works = JSON.parse(JSON.stringify(PRESET_WORKS));
          saveWorks(works);
          searchInput.value = ''; currentFilter = 'all';
          filterBtns.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
          filterBtns.querySelector('[data-filter="all"]').classList.add('active');
          refreshDisplay();
          showToast('预设已恢复','success');
        }
      });

      searchInput.addEventListener('input', refreshDisplay);
      filterBtns.addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        filterBtns.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        refreshDisplay();
      });

      document.addEventListener('keydown', e => {
        if (e.key==='Escape') {
          if (detailModal.style.display==='flex') closeDetail();
          if (formModal.style.display==='flex') closeForm();
        }
      });

      // 初始化显示
      refreshDisplay();
      resetForm();
      formModal.style.display = 'none';
      detailModal.style.display = 'none';
    }
  </script>
</body>
</html>
